<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel = "stylesheet" href="styles.css">
    <script src="script.js"></script>
    <title>Kibble.io</title>
</head>
<body>
    <a href = "index.html"><img src="assets/kibble.jpg" style="height:40px;"></a>
    <ul class="header">
        <div class="timer">
            <li>
                <img src="assets/timer.jpg">
                <p id="time">time</p>
            </li>
        </div>
        <div class="round">
            <p>Round 
                <span id="currentRound">Current Round</span>
                of 
                <span id ="totalRound">Total Round</span>
            </p>
        </div>
        <div>
            <p>GUESS THIS</p>
            <span id="wordDash">Word Length</span>
            <span id="wordLength">
        </div>
    </ul>
    <ul class="leaderboard">
        <li>
            <p>#1</p>
            <p id="no1">user1</p>
        </li>
        <li>
            <p>#2</p>
            <p id="no2">user2</p>
        </li>
    </ul>
    <div class="playableModal">
        <p>Playable Modal</p>
        <div class="drawTools">
            <span id="choseColor"></span>
            <h1>Draw</h1>
            <label for="stroke">Stroke</label>
            <input id="stroke" name="stroke" type="color">
            <label for="lineWidth">Line Width</label>
            <input id="lineWidth" name="lineWidth" type="number" value="5">
            <button id="clear">Clear</button>
        </div>
        <div id="drawing-board">
            <canvas id="drawing-board"></canvas>
        </div>
    </div>
    <div class="chat">
        <span id="user">User</span>
        <span id="guess">Guesses</span>
    </div>

    <footer>
        <p>Kibble.io 2026</p>
        <p>Come check out my <a href="https://github.com/fanglin0">Github</a></p>
    </footer>
    
    
</body>
</html>
